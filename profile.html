<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="./assets/img/facebook.png" />

</head>
<body>
    <header class="top-bar">
        <section class="logo__search">
            <div>
                <a href="index.html">
                    <img src="./assets/img/facebook.png" alt="" class="logo">
                </a>
            </div>

            <div class="search-bar">
                <img src="./assets/img/search.png" alt="" class="toggleImg">
                <input type="search" placeholder="Search Facebook" id="search">
            </div>
        </section>
        <section class="main-nav">

            <div class="home">
                <img class="header-icon toggleImg" src="./assets/img/home.PNG" alt="">

            <div>

            <div>

            <div>

        </section>
        <section class="user">
            <div class="menu-icon-div user-div">
                <img class="header-icon menu-icon toggleImg" src="./assets/img/dots-menu.PNG" alt="">
            </div>
            <div class="user-div">
                <img class="header-icon toggleImg" src="./assets/img/notification.PNG" alt="">
            </div>
            <div class="user-div">
                <img class="header-icon toggleImg" src="./assets/img/messenger.PNG" alt="">
            </div>
            <div class="profile-icon" >
                <img id="profile-btn" class="profile-icon" src="./assets/img/profile.jpg" alt="">
            </div>
            <div id="profile-menu">
                
                <a href="profile.html"><p>Profile</p></a>
                
                <p id="theme">Theme
                    <span class="toggleIcon">
                    </span>
                </p>
							
                <p>Setting</p>
                <p>Logout</p>
            </div>

        </section>
    </header>
    
    <script src="./assets/js/fb.js"></script>

</html>
