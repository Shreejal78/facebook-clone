<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="./assets/img/facebook.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <link rel="stylesheet" href="./assets/css/LC.css" />
  </head>

  <body class="login-page">
    <header>
      <img src="./assets/img/facebook.png" alt="" />
      <h1>Facebook</h1>
    </header>
    <hr />
    <main>
      <form method="get" id="loginForm" class="LCform">
        <p class="title">Log in to Facebook</p>
        <div class="lbl">
          <input type="email" id="e-num" class="inp-login" name="e-num" />
          <label for="e-num" class="inp-lbl"
            >Email address or mobile number</label
          >
        </div>
        <div class="lbl">
          <input type="password" id="pass" class="inp-login" name="pass" />
          <label for="pass" class="inp-lbl">Password</label>
        </div>
        <input type="submit" name="login" id="login" value="Log in" />
        <p class="forgotPass">Forgotten password?</p>
      </form>
      <a href="create.html"><button id="create">Create new account</button></a>
    </main>
    <script src="./assets/js/LC.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
				let eList = [email, pass];
        form.addEventListener("submit", e => {
          e.preventDefault();

          if (email.value.trim() === "") {
            showError(email.parentElement, "Fill EMAIL");
          } else if (pass.value.trim() === "") {
            showError(pass.parentElement, "Fill PASSWORD");
          }

          if (pass.value.length <= 8 && pass.value.length != 0 ) {
            showError(
              pass.parentElement,
              "Password Mush be greater than 8 letters"
            );
          }
          
        });
        eList.forEach(e => {
          e.addEventListener("input", () => {
            removeError(e.parentElement);
          });
					e.addEventListener('blur',() => {
						e.parentElement.querySelector('.inp-login').style.borderColor = 'rgba(60, 58, 58, 0.434)'
					})

					e.addEventListener('focus',() => {
						e.parentElement.querySelector('.inp-login').style.borderColor = 'rgb(0, 123, 255)'
					})
        });
      });
    </script>
  </body>
</html>
