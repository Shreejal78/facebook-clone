<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="./assets/img/facebook.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./assets/css/login.css">
</head>
<body>
    <header>
        <img src="./assets/img/facebook.png" alt="">
        <h1>Facebook</h1>
    </header>
    <hr>
    <main>
        <form >
            <p class="title">Log in to Facebook</p>
            <div class="lbl">
                <input type="text" id="e-num" class="inp-login" name="e-num">
                <label for="e-num" class="inp-lbl">Email address or mobile number</label>
            </div>
            <div class="lbl">
                <input type="password" id="pass" class="inp-login" name="pass">
                <label for="pass" class="inp-lbl">Password</label>
            </div>
            <input type="submit" name="login" id="login" value="Log in">
            <p class="forgotPass">Forgotten password?</p>
        </form>
        <a href="create.html" ><button id="create">Create new account</button></a>

    </main>
    <script src="./assets/js/login.js"></script>
    
</body>
</html>
